version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: foodstore-postgres
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: foodstore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
